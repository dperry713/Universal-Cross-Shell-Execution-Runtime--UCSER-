---
# UCSER Kubernetes Deployment Manifests
# Apply with: kubectl apply -f k8s/

# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: ucser-prod

---
# ConfigMap for configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ucser-config
  namespace: ucser-prod
data:
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  ENABLE_MFA: "true"
  REQUIRE_SIGNATURE_VERIFICATION: "true"
  AUDIT_LOG_RETENTION_DAYS: "2555"

---
# Secret for cryptographic keys and credentials
apiVersion: v1
kind: Secret
metadata:
  name: ucser-secrets
  namespace: ucser-prod
type: Opaque
stringData:
  database-url: "postgresql+psycopg2://ucser_user:PASSWORD@postgres:5432/ucser_prod"
  vault-token: "VAULT_TOKEN_HERE"
  jwt-secret: "JWT_SECRET_HERE"
  hmac-key: "HMAC_KEY_HERE"
  signing-key: |
    -----BEGIN PRIVATE KEY-----
    # Private key content here
    -----END PRIVATE KEY-----

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ucser
  namespace: ucser-prod

---
# ClusterRole for UCSER
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ucser
rules:
  # Read pods in the same namespace
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Read configmaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ucser
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ucser
subjects:
  - kind: ServiceAccount
    name: ucser
    namespace: ucser-prod

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ucser
  namespace: ucser-prod
  labels:
    app: ucser
    version: "1.0"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ucser
  template:
    metadata:
      labels:
        app: ucser
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ucser
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: ucser
          image: ucser:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # Environment variables from ConfigMap and Secret
          envFrom:
            - configMapRef:
                name: ucser-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ucser-secrets
                  key: database-url
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ucser-secrets
                  key: vault-token
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ucser-secrets
                  key: jwt-secret
            - name: HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: ucser-secrets
                  key: hmac-key

          # Resource limits and requests
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # Health checks
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/data

      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir:
            sizeLimit: 1Gi

      # Pod affinity for spreading
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - ucser
                topologyKey: kubernetes.io/hostname

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: ucser
  namespace: ucser-prod
  labels:
    app: ucser
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: ucser

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ucser
  namespace: ucser-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ucser
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

---
# NetworkPolicy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ucser
  namespace: ucser-prod
spec:
  podSelector:
    matchLabels:
      app: ucser
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000

  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

    # Allow PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432

    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

    # Allow external HTTPS (for Vault, etc.)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ucser
  namespace: ucser-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ucser

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ucser
  namespace: ucser-prod
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ucser.example.com
      secretName: ucser-tls

  rules:
    - host: ucser.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ucser
                port:
                  number: 80
