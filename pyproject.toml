[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
(
  ^\.git/
  | ^\.venv/
  | ^build/
  | ^dist/
  | ^\.pytest_cache/
  | ^\.mypy_cache/
  | ^\.ruff_cache/
  | ^runtime_space/
  | ^docs/superpowers/plans/
)
'''

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  ".git",
  ".venv",
  "build",
  "dist",
  ".pytest_cache",
  ".mypy_cache",
  ".ruff_cache",
  "runtime_space",
  "docs/superpowers/plans",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_return_any = false
warn_unused_configs = true
files = ["api", "cli", "core", "engine", "security", "semantic", "utils"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
